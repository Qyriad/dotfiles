"$schema" = "https://jj-vcs.github.io/jj/latest/config-schema.json"
# vim: tabstop=2

[fileset-aliases]
# Make it easy to, e.g., diff revs ignoring changes in lockfiles.
LOCK = '**/Cargo.lock | **/package-lock.json | **/flake.lock | **/lazy-lock.json'
NONLOCK = '~LOCK'

[revset-aliases]
here = "::@"

# Basically x::y but reversible.
# Because we sometimes forget which order it is.
'between(x, y)' = 'x::y | y::x'

'closest_bookmark(to)' = 'heads(::to & bookmarks())'
'fork(for)' = '@..for | (@..for)-'

'active-heads' = 'heads(descendants(root())) ~ (ancestors(trunk()) | tags() | remote_bookmarks() | bookmarks("git-series/"))'
'mutable-summary' = 'ancestors(heads(mutable()), 2)'

'unmerged' = '::@ ~ ancestors(trunk())'
'unmerged(for)' = '::for ~ ancestors(trunk())'
#present-tree = 'unmerged | descendants(unmerged) | descendants(@)'

#squid = '@ | @- | trunk() | heads(@) | heads(@-) | heads(trunk())'

'surrounding(for)' = 'descendants(for) | (ancestors(for) ~ ancestors(trunk()))'
priv = "description(glob:'PRIVATE:*') | description(glob:'QYRIAD:*')"

[aliases]
s = ["status", "--no-pager"]
tug = [
	"bookmark",
	"move",
	"--from", "closest_bookmark(@-)",
	"--to", "@-",
]
present = ['log', '-r', 'present-tree']
#l = ['log', '-T', 'qshortlog']
l = ['util', 'exec', '--', 'zsh', '-c', """
#!/usr/bin/env zsh
set -euo pipefail
# No arguments case.
if [[ "$#" -eq 0 ]]; then
	exec jj log "$@"
fi
if [[ "$1" != "-r" ]]; then
	exec jj log -r "$@"
fi
exec jj log "$@"
""", ""]
lh = ['log', '-T', 'qshortlog', '-r', 'here']
lo = ['log', '-T', 'qlog']
here = ['log', '-r', 'here']
last = ['show', '-r', '@-']
# Non-mutating `jj op log`
op-inspect = ['op', 'log', '--at-op=@', '--ignore-working-copy']
stat = ['show', '--stat']
sh = ['show', '-T', 'qlog']

[templates]
#log = 'builtin_log_comfortable'
log = 'qlog_comfortable'

[colors]
qshortest = { fg = "bright blue", bold = true }
qshort = { fg = "blue", bold = false }

[template-aliases]
qlog_comfortable = 'qlog_compact ++ "\n"'

'q_added_removed(stat)' = '''
concat(
	label("diff added",
		"+" ++ stat.total_added(),
	),
	" ",
	label("diff removed",
		"-" ++ stat.total_removed(),
	),
)
'''

qlog_compact = 'qlog_compact(self)'
# A very slight modification on the default `builtin_log_compact(commit)`.
'qlog_compact(commit)' = '''
if(commit.root(),
	format_root_commit(commit),
	label(
		separate(" ",
			if(commit.current_working_copy(), "working_copy"),
			if(commit.immutable(), "immutable", "mutable"),
			if(commit.conflict(), "conflicted"),
		),
		concat(
			format_short_commit_header(commit) ++ "\n",
			separate(" ",
				if(commit.empty(), empty_commit_marker),
				if(commit.description(),
					commit.description().first_line(),
					label(if(commit.empty(), "empty"), description_placeholder),
				),
				surround("(", ")",
					q_added_removed(commit.diff().stat()),
				),
			) ++ "\n",
		),
	)
)
'''

# Format an ID highlighting the shortest prefix in bold and color,
# the rest of the "short" prefix in unbolded color,
# and the rest in the "rest" grey color.
'format_id_short_without_shortest(id)' = 'id.short().remove_prefix(id.shortest())'
'format_id_without_short(id)' = 'stringify(id).remove_prefix(id.short())'

'format_id(id)' = '''
	concat(
		label("qshortest", id.shortest()),
		label("qshort", format_id_short_without_shortest(id)),
		label("rest", format_id_without_short(id)),
	)
'''

'qformat_id(id)' = '''
	concat(
		label("qshortest", id.shortest()),
		label("qshort", id.short().remove_prefix(id.shortest())),
		label("rest", stringify(id).remove_prefix(id.short())),
	)
'''

'format_timestamp_combined(timestamp)' = '''
	timestamp.local().format("%a, %B %d %r (%Z)")
	++ " —  UTC "
	++ timestamp.utc().format("%Y/%m/%d %R")
'''

# OVERRIDE: builtin `format_timestamp`.
'format_timestamp(timestamp)' = 'format_timestamp_combined(timestamp)'

'qformat_signature(signature)' = '''
	coalesce(signature.name(), name_placeholder)
	++ " <" ++ coalesce(signature.email(), email_placeholder) ++ ">"
	++ " (" ++ format_timestamp_combined(signature.timestamp()) ++ ")"
'''

qlog = '''
	concat(
		"Commit ID: " ++ qformat_id(commit_id) ++ "\n",
		"Change ID: " ++ qformat_id(change_id) ++ "\n",
		surround("Bookmarks: ", "\n", separate(" ", local_bookmarks, remote_bookmarks)),
		surround("Tags     : ", "\n", tags),
		"Author:    " ++ format_detailed_signature(author) ++ "\n",
		"Committer: " ++ format_detailed_signature(committer)  ++ "\n",
		if(config("ui.show-cryptographic-signatures").as_boolean(),
			"Signature: " ++ format_detailed_cryptographic_signature(signature) ++ "\n"
		),
		"\n",
		indent("    ",
			if(description,
				description.trim_end(),
				label(if(empty, "empty"), description_placeholder)
			) ++ "\n"
		),
		"\n",
		indent("  ", diff.stat()),
		"\n",
	)
'''

qshortlog = '''
	concat(
		"Commit ID: " ++ qformat_id(commit_id) ++ "\n",
		"Change ID: " ++ qformat_id(change_id) ++ "\n",
		surround("Bookmarks: ", "\n", separate(" ", local_bookmarks, remote_bookmarks)),
		surround("Tags     : ", "\n", tags),
		"Author:    " ++ format_detailed_signature(author) ++ "\n",
		if(config("ui.show-cryptographic-signatures").as_boolean(),
			"Signature: " ++ format_detailed_cryptographic_signature(signature) ++ "\n"
		),
		"\n",
		indent("    ",
			if(description,
				description.trim_end().first_line(),
				label(if(empty, "empty"), description_placeholder)
			) ++ "\n"
		),
		"\n",
	)
'''

[git]
# Don't push these commits.
private-commits = 'priv'

[snapshot]
auto-track = "none()"

[user]
name = "Qyriad"
email = "qyriad@qyriad.me"

[ui]
pager = "delta"
diff-formatter = ":git"
#log-word-wrap = true

[merge-tools.diffconflicts]
program = "nvim"
merge-args = [
	"-c", "let g:jj_diffconflicts_marker_length=$marker_length",
	"-c", "JJDiffConflicts!", "$output", "$base", "$left", "$right",
]
merge-tool-edits-conflict-markers = true
