# vim: sw=0 ts=2 noet
# Noise canceling source
#
# Copy this file into a conf.d/ directory such as
# ~/.config/pipewire/filter-chain.conf.d/
#
# Adjust the paths to the rnnoise plugin to match your system
#
context.modules = [
	{
		name = libpipewire-module-filter-chain
		flags = [ nofail ]
		args = {
			node.description = "Noise Canceling Source Node"
			media.name = "Noise Canceling source media"
			filter.graph = {
				nodes = [
					{
						type   = ladspa
						name   = rnnoise
						# The path to the plugin. The suffix .so is appended to
						# this string and then the file is then located in the directories
						# listed in the environment variable LADSPA_PATH or
						# /usr/lib64/ladspa, /usr/lib/ladspa or the system library directory
						# as a fallback.
						# You might want to use an absolute path here to avoid problems.
						#plugin = "librnnoise_ladspa"
						plugin = "/home/qyriad/.local/state/nix/profile/lib/ladspa/librnnoise_ladspa.so"
						label  = noise_suppressor_mono
						control = {
							#"VAD Threshold (%)" 50.0
							"VAD Threshold (%)" 95.0
							"VAD Grace Period (ms)" = 200
							"Retroactive VAD Grace (ms)" = 5
						}
					}
				]
			}
			audio.position = [ MONO ]
			capture.props = {
				node.name = "effect_input.rnnoise"
				#node.group = "filter-chain-rnnoise-scarlett-mic1"
				#node.link-group = "filter-chain-rnnoise-scarlett-mic1"
				node.passive = true
				#target.object = "alsa_input.usb-Focusrite_Scarlett_Solo_USB_Y7Y663P27FB970-00.HiFi__Mic1__source"
				target.object = "alsa_input.usb-Focusrite_Scarlett_Solo_USB_Y7Y663P27FB970-00.Direct__Direct__source"
				node.dont-fallback = true
				audio.rate = 48000
				#media.icon-name = "meeting-organizer"
				#device.icon-name = "meeting-organizer"
				media.icon-name = "microphone-sensitivity-medium"
				device.icon-name = "microphone-sensitivity-medium"
			}
			playback.props = {
				node.name = "effect_output.rnnoise"
				#node.group = "filter-chain-rnnoise-scarlett-mic1"
				#node.link-group = "filter-chain-rnnoise-scarlett-mic1"
				media.class = Audio/Source
				audio.rate = 48000
				#media.icon-name = "microphone-sensitivity-medium"
				#device.icon-name = "microphone-sensitivity-medium"
				media.icon-name = "headset"
				device.icon-name = "headset"
			}
		}
	}
]
